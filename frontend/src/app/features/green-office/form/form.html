<div class="min-h-screen bg-gray-50/70 px-4 sm:px-6 lg:px-8 py-8">

  <!-- ── Page Header ── -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
    <div>
      <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">แบบประเมินตนเอง (Self-Assessment)</h1>
      <p class="mt-1 text-sm text-gray-500 max-w-xl">ประเมินความพร้อมขององค์กรตามมาตรฐาน Green Office ทั้ง 6 หมวด</p>
    </div>
    <div class="flex flex-wrap gap-2 shrink-0">
      <button
        class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-sm hover:bg-gray-50 hover:-translate-y-0.5 transition-all"
        (click)="saveProgress()">
        <i class="fa-regular fa-floppy-disk mr-2 text-gray-500"></i> บันทึกร่าง
      </button>
      <button
        class="inline-flex items-center rounded-lg bg-green-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-green-700 hover:-translate-y-0.5 transition-all"
        (click)="submitAssessment()">
        <i class="fa-solid fa-paper-plane mr-2"></i> ส่งแบบประเมิน
      </button>
    </div>
  </div>

  <!-- ── Main Grid ── -->
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

    <!-- ── LEFT PANEL ── -->
    <div class="lg:col-span-4 xl:col-span-3 flex flex-col gap-5">

      <!-- Radar Chart Card -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-4 pt-4 pb-2 border-b border-gray-50">
          <p class="text-xs font-bold uppercase tracking-widest text-gray-400">ภาพรวมความพร้อม</p>
        </div>
        <div class="p-4 flex justify-center" style="height: 230px;">
          <canvas baseChart
            [data]="radarChartData"
            [options]="radarChartOptions"
            [type]="radarChartType">
          </canvas>
        </div>
      </div>

      <!-- Category List Card -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-4 pt-4 pb-3 border-b border-gray-100">
          <p class="text-xs font-bold uppercase tracking-widest text-gray-400">หมวดการประเมิน</p>
        </div>
        <div class="p-3 flex flex-col gap-1.5">
          <button
            *ngFor="let cat of categories"
            class="w-full text-left px-3 py-3 rounded-lg border transition-all group"
            [class.border-green-200]="activeCategory === cat.id"
            [class.bg-green-50]="activeCategory === cat.id"
            [class.border-transparent]="activeCategory !== cat.id"
            [class.bg-transparent]="activeCategory !== cat.id"
            [class.hover:bg-gray-50]="activeCategory !== cat.id"
            (click)="selectCategory(cat.id)">

            <!-- Category title + status icon -->
            <div class="flex items-center justify-between gap-2 mb-2">
              <span class="text-sm font-semibold leading-snug truncate"
                    [class.text-green-700]="activeCategory === cat.id"
                    [class.text-gray-700]="activeCategory !== cat.id">
                {{ cat.title }}
              </span>
              <i *ngIf="cat.status === 'completed'" class="fa-solid fa-circle-check text-green-500 shrink-0 text-sm"></i>
              <span *ngIf="cat.status === 'in-progress'" class="shrink-0 w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>
            </div>

            <!-- Progress bar -->
            <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
              <div class="h-full rounded-full transition-all duration-500"
                   [class.bg-green-500]="cat.progress === 100"
                   [class.bg-yellow-400]="cat.progress > 0 && cat.progress < 100"
                   [class.bg-gray-200]="cat.progress === 0"
                   [style.width.%]="cat.progress"></div>
            </div>
            <div class="flex justify-end mt-1">
              <span class="text-[10px] font-bold"
                    [class.text-green-600]="cat.progress === 100"
                    [class.text-yellow-600]="cat.progress > 0 && cat.progress < 100"
                    [class.text-gray-400]="cat.progress === 0">
                {{ cat.progress }}%
              </span>
            </div>
          </button>
        </div>
      </div>

    </div>

    <!-- ── RIGHT PANEL ── -->
    <div class="lg:col-span-8 xl:col-span-9 flex flex-col gap-5">

      <!-- Category header card -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 px-6 py-4 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-green-50 flex items-center justify-center shrink-0">
          <i class="fa-solid fa-list-check text-green-600"></i>
        </div>
        <div>
          <p class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-0.5">กำลังประเมิน</p>
          <h2 class="text-base font-extrabold text-gray-900 leading-snug">{{ activeCategoryTitle }}</h2>
        </div>
      </div>

      <!-- Question Cards -->
      <div class="flex flex-col gap-4">
        <div
          *ngFor="let q of questions; let i = index"
          class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 transition-all hover:shadow-md">

          <div class="flex gap-4">
            <!-- Question badge -->
            <div class="shrink-0 w-10 h-10 rounded-xl bg-green-50 border border-green-100 flex items-center justify-center">
              <span class="text-xs font-black text-green-700">{{ q.id }}</span>
            </div>

            <div class="flex-1 min-w-0">
              <!-- Question text -->
              <p class="text-sm font-semibold text-gray-800 leading-relaxed mb-4">{{ q.text }}</p>

              <!-- Answer options -->
              <div class="flex flex-wrap gap-3">

                <!-- YES option -->
                <label class="cursor-pointer">
                  <input type="radio" [name]="'q_'+q.id" value="yes" (change)="answerQuestion(q, 'yes')" [checked]="q.answer === 'yes'" class="sr-only">
                  <span class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border-2 text-sm font-semibold transition-all select-none"
                        [class.border-green-500]="q.answer === 'yes'"
                        [class.bg-green-50]="q.answer === 'yes'"
                        [class.text-green-700]="q.answer === 'yes'"
                        [class.border-gray-200]="q.answer !== 'yes'"
                        [class.bg-white]="q.answer !== 'yes'"
                        [class.text-gray-500]="q.answer !== 'yes'"
                        [class.hover:border-green-300]="q.answer !== 'yes'">
                    <i class="fa-solid fa-check text-xs"
                       [class.text-green-600]="q.answer === 'yes'"
                       [class.text-gray-400]="q.answer !== 'yes'"></i>
                    มีการดำเนินการ
                  </span>
                </label>

                <!-- NO option -->
                <label class="cursor-pointer">
                  <input type="radio" [name]="'q_'+q.id" value="no" (change)="answerQuestion(q, 'no')" [checked]="q.answer === 'no'" class="sr-only">
                  <span class="inline-flex items-center gap-2 px-4 py-2 rounded-lg border-2 text-sm font-semibold transition-all select-none"
                        [class.border-red-400]="q.answer === 'no'"
                        [class.bg-red-50]="q.answer === 'no'"
                        [class.text-red-600]="q.answer === 'no'"
                        [class.border-gray-200]="q.answer !== 'no'"
                        [class.bg-white]="q.answer !== 'no'"
                        [class.text-gray-500]="q.answer !== 'no'"
                        [class.hover:border-red-200]="q.answer !== 'no'">
                    <i class="fa-solid fa-xmark text-xs"
                       [class.text-red-500]="q.answer === 'no'"
                       [class.text-gray-400]="q.answer !== 'no'"></i>
                    ยังไม่มีการดำเนินการ
                  </span>
                </label>

              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Navigation -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 px-6 py-4 flex items-center justify-between">
        <button
          class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-sm hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-all"
          [disabled]="activeCategory === 1"
          (click)="selectCategory(activeCategory - 1)">
          <i class="fa-solid fa-arrow-left mr-2 text-gray-400"></i> หมวดหมู่ก่อนหน้า
        </button>

        <!-- Progress indicator -->
        <div class="hidden sm:flex items-center gap-1.5">
          <span
            *ngFor="let cat of categories"
            class="w-2 h-2 rounded-full transition-all"
            [class.bg-green-500]="cat.status === 'completed'"
            [class.bg-green-300]="activeCategory === cat.id && cat.status !== 'completed'"
            [class.bg-gray-200]="activeCategory !== cat.id && cat.status !== 'completed'"
            [title]="cat.title">
          </span>
        </div>

        <button
          class="inline-flex items-center rounded-lg bg-green-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all"
          [disabled]="activeCategory === categories.length"
          (click)="selectCategory(activeCategory + 1)">
          หมวดหมู่ถัดไป <i class="fa-solid fa-arrow-right ml-2"></i>
        </button>
      </div>

    </div>
  </div>
</div>
