<div [class]="cardClasses">
  <div class="card-content-wrapper relative z-10">
    <div class="d-flex justify-content-between align-items-start mb-3">
      <p class="card-title text-uppercase tracking-widest m-0" 
         [class.text-white]="isGlass" 
         [class.text-muted]="!isGlass" 
         [class.opacity-75]="isGlass">
        {{ title }}
      </p>
      
      <div class="icon-wrapper d-flex align-items-center justify-content-center rounded-3"
           [ngClass]="isGlass ? 'bg-white bg-opacity-25 backdrop-blur' : 'bg-' + theme + '-subtle text-' + theme">
        <i [class]="iconClass"></i>
      </div>
    </div>
    
    <div class="mt-4">
      <div class="d-flex align-items-end gap-2">
        <h2 class="card-value fw-bold m-0" [class.text-white]="isGlass" [class.text-dark]="!isGlass">
          {{ value }}
        </h2>
        <span *ngIf="unit" class="card-unit fw-medium mb-1" 
              [class.text-white]="isGlass" 
              [class.text-muted]="!isGlass" 
              [class.opacity-75]="isGlass">
          {{ unit }}
        </span>
      </div>
      <p *ngIf="subtitle" class="card-subtitle small mt-1 m-0"
         [class.text-white]="isGlass" 
         [class.text-muted]="!isGlass" 
         [class.opacity-75]="isGlass">
        {{ subtitle }}
      </p>
    </div>
    
    <div *ngIf="trendValue" class="mt-4 d-flex align-items-center gap-2">
      <span class="trend-badge d-inline-block px-2 py-1 rounded-pill small fw-bold"
            [ngClass]="{
              'bg-white bg-opacity-25 text-white': isGlass,
              'text-danger bg-danger-subtle': !isGlass && trendType === 'up',
              'text-success bg-success-subtle': !isGlass && trendType === 'down',
              'text-secondary bg-secondary-subtle': !isGlass && trendType === 'neutral'
            }">
        <i class="fa-solid fa-arrow-up me-1" *ngIf="trendType === 'up'"></i>
        <i class="fa-solid fa-arrow-down me-1" *ngIf="trendType === 'down'"></i>
        <i class="fa-solid fa-minus me-1" *ngIf="trendType === 'neutral'"></i>
        {{ trendValue }}
      </span>
      <span class="small" 
            [class.text-white]="isGlass" 
            [class.text-muted]="!isGlass" 
            [class.opacity-75]="isGlass">
        {{ trendLabel }}
      </span>
    </div>
    
    <div class="mt-3">
      <ng-content></ng-content>
    </div>
  </div>
</div>
