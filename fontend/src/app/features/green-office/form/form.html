<div class="container-fluid p-4 animate-in">
  <!-- Header Section -->
  <div class="d-flex justify-content-between align-items-end mb-4">
    <div>
      <h3 class="fw-bold mb-1 text-primary"><i class="fa-solid fa-clipboard-list me-2"></i> แบบประเมินตนเอง (Self-Assessment)</h3>
      <p class="text-muted mb-0">ประเมินและติดตามความพร้อมขององค์กรตามมาตรฐาน Green Office ทั้ง 6 หมวด</p>
    </div>
    
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary py-2 px-4 shadow-sm fw-bold" (click)="saveProgress()">
        <i class="fa-regular fa-floppy-disk me-2"></i> บันทึกร่าง
      </button>
      <button class="btn btn-primary py-2 px-4 shadow-sm fw-bold" (click)="submitAssessment()">
        <i class="fa-solid fa-paper-plane me-2"></i> ยืนยันส่งแบบประเมิน
      </button>
    </div>
  </div>

  <div class="row g-4">
    <!-- Left: Category List & Chart -->
    <div class="col-lg-4 col-xl-3">
      
      <!-- Radar Chart Card -->
      <div class="card stat-card border-0 shadow-sm rounded-4 mb-4 overflow-hidden">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4 text-center">
          <h6 class="fw-bold text-uppercase text-muted mb-0" style="letter-spacing: 0.5px; font-size: 0.8rem;">ภาพรวมความพร้อม</h6>
        </div>
        <div class="card-body p-4 d-flex justify-content-center" style="height: 250px;">
          <canvas baseChart
            [data]="radarChartData"
            [options]="radarChartOptions"
            [type]="radarChartType">
          </canvas>
        </div>
      </div>

      <!-- Categories Card -->
      <div class="card stat-card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-2 px-4">
          <h6 class="fw-bold text-uppercase text-muted mb-0" style="letter-spacing: 0.5px; font-size: 0.8rem;">หมวดการประเมิน</h6>
        </div>
        
        <div class="card-body p-3">
          <div class="category-list d-flex flex-column gap-2">
            <button *ngFor="let cat of categories" 
                    class="category-item text-start border-0 w-100"
                    [class.active]="activeCategory === cat.id"
                    (click)="selectCategory(cat.id)">
              
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-bold text-truncate me-2 text-dark" style="font-size: 0.9rem;">{{ cat.title }}</span>
                
                <!-- Status Icons -->
                <i *ngIf="cat.status === 'completed'" class="fa-solid fa-circle-check text-success ms-auto"></i>
                <div *ngIf="cat.status === 'in-progress'" class="spinner-grow text-warning spinner-grow-sm ms-auto" role="status">
                  <span class="visually-hidden">In Progress...</span>
                </div>
              </div>
              
              <!-- Progress Bar -->
              <div class="progress" style="height: 6px; border-radius: 10px;">
                <div class="progress-bar" 
                     [class.bg-success]="cat.progress === 100"
                     [class.bg-warning]="cat.progress > 0 && cat.progress < 100"
                     [style.width.%]="cat.progress"></div>
              </div>
              <div class="text-end mt-1 text-muted fw-medium" style="font-size: 0.75rem;">{{ cat.progress }}%</div>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Question Form -->
    <div class="col-lg-8 col-xl-9">
      <div class="card stat-card border-0 shadow-sm rounded-4 min-vh-50 d-flex flex-column">
        <div class="card-header bg-white border-bottom p-4">
          <h5 class="fw-bold mb-0 text-primary">
            <i class="fa-solid fa-list-check me-2"></i> 
            {{ activeCategoryTitle }}
          </h5>
        </div>
        
        <div class="card-body p-4 flex-grow-1">
          <div class="question-list">
            
            <div *ngFor="let q of questions; let i = index" class="question-card p-4 mb-4 border-0 rounded-4 shadow-sm bg-light">
              <div class="d-flex gap-3">
                <div class="question-number border border-2 border-primary bg-white text-primary fw-bold rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 45px; height: 45px; font-size: 1.2rem;">
                  {{ q.id }}
                </div>
                
                <div class="flex-grow-1">
                  <p class="mb-3 fw-bold text-dark fs-6">{{ q.text }}</p>
                  
                  <div class="d-flex flex-wrap gap-3">
                    <label class="custom-radio">
                      <input type="radio" [name]="'q_'+q.id" value="yes" (change)="answerQuestion(q, 'yes')" [checked]="q.answer === 'yes'">
                      <span class="radio-box border border-2 rounded-3 px-4 py-2 bg-white cursor-pointer fw-semibold text-muted transition-all">
                        <i class="fa-solid fa-check me-2"></i> มีการดำเนินการ
                      </span>
                    </label>
                    
                    <label class="custom-radio">
                      <input type="radio" [name]="'q_'+q.id" value="no" (change)="answerQuestion(q, 'no')" [checked]="q.answer === 'no'">
                      <span class="radio-box border border-2 rounded-3 px-4 py-2 bg-white cursor-pointer fw-semibold text-muted transition-all">
                        <i class="fa-solid fa-xmark me-2"></i> ยังไม่มีการดำเนินการ
                      </span>
                    </label>
                  </div>
                </div>
              </div>
            </div>
            
          </div>
        </div>
        
        <div class="card-footer bg-light border-top p-4 d-flex justify-content-between mt-auto">
          <button class="btn btn-outline-secondary px-4 fw-bold shadow-sm" [disabled]="activeCategory === 1" (click)="selectCategory(activeCategory - 1)">
            <i class="fa-solid fa-arrow-left me-2"></i> หมวดหมู่ก่อนหน้า
          </button>
          <button class="btn btn-primary px-4 fw-bold shadow-sm" [disabled]="activeCategory === categories.length" (click)="selectCategory(activeCategory + 1)">
            หมวดหมู่ถัดไป <i class="fa-solid fa-arrow-right ms-2"></i>
          </button>
        </div>
      </div>
    </div>
    
  </div>
</div>
